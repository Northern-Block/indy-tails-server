name: Deploy tails-server to EC2

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - dev
          - qa
          - stg
          - sandbox
          - prod
        default: dev

permissions:
  contents: read
  id-token: write

env:
  TARGET_ENV: ${{ inputs.environment }}
  TARGET_AWS_REGION: ca-central-1
  ENV_VARIABLES_SECRET_PREFIX: eapi
  APP_NAME: orbit-enterpriseapi-tails
  CICD_CONFIG_SECRET_ID: arn:aws:secretsmanager:us-east-1:575266917932:secret:cicd/configuration
  DEPLOY_PATH: /home/ubuntu/eapi/orbit-enterpriseapi-tails
  COMPOSE_RELATIVE_PATH: docker/docker-compose.yml

jobs:
  deploy:
    name: Deploy via AWS SSM
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate compose file exists
        shell: bash
        run: |
          set -euo pipefail
          test -f "${{ env.COMPOSE_RELATIVE_PATH }}" || {
            echo "::error::Compose file not found: ${{ env.COMPOSE_RELATIVE_PATH }}"
            exit 1
          }

      - name: Configure AWS credentials (config reader)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::575266917932:role/GitHubActionsCICD
          aws-region: ${{ env.TARGET_AWS_REGION }}
          role-session-name: GitHubActions-Config

      - name: Load deployment configuration from Secrets Manager
        id: config
        shell: bash
        run: |
          set -euo pipefail

          if CONFIG_JSON=$(aws secretsmanager get-secret-value \
            --secret-id "${{ env.CICD_CONFIG_SECRET_ID }}" \
            --query SecretString --output text \
            --region us-east-1 2>/dev/null); then
            echo "::notice::Loaded CICD config from configured secret."
          else
            CONFIG_JSON=$(aws secretsmanager get-secret-value \
              --secret-id cicd/configuration \
              --query SecretString --output text \
              --region us-east-1)
            echo "::warning::Fell back to cicd/configuration."
          fi

          DEPLOY_ROLE_KEY="${{ env.TARGET_ENV }}_aws_role"
          EC2_INSTANCE_KEY="${{ env.TARGET_ENV }}_ec2_instance_id"
          DEPLOY_REGION_KEY="${{ env.TARGET_ENV }}_aws_region"

          DEPLOY_ROLE=$(echo "$CONFIG_JSON" | jq -r --arg k "$DEPLOY_ROLE_KEY" '.[$k] // .aws_role_arn // empty')
          EC2_INSTANCE_ID=$(echo "$CONFIG_JSON" | jq -r --arg k "$EC2_INSTANCE_KEY" '.[$k] // empty')
          DEPLOY_REGION=$(echo "$CONFIG_JSON" | jq -r --arg k "$DEPLOY_REGION_KEY" --arg d "${{ env.TARGET_AWS_REGION }}" '.[$k] // $d')

          if [ -z "$DEPLOY_ROLE" ] || [ "$DEPLOY_ROLE" = "null" ]; then
            echo "::error::Missing deploy role in secret. Expected key: $DEPLOY_ROLE_KEY or aws_role_arn"
            exit 1
          fi
          if [ -z "$EC2_INSTANCE_ID" ] || [ "$EC2_INSTANCE_ID" = "null" ]; then
            echo "::error::Missing EC2 instance id in secret. Expected key: $EC2_INSTANCE_KEY"
            exit 1
          fi

          echo "deploy_role_arn=$DEPLOY_ROLE" >> "$GITHUB_OUTPUT"
          echo "ec2_instance_id=$EC2_INSTANCE_ID" >> "$GITHUB_OUTPUT"
          echo "deploy_region=$DEPLOY_REGION" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials (deploy role)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ steps.config.outputs.deploy_role_arn }}
          aws-region: ${{ steps.config.outputs.deploy_region }}
          role-session-name: GitHubActions-Deploy

      - name: Build .env content from Secrets Manager
        id: envfile
        shell: bash
        run: |
          set -euo pipefail
          SECRET_ID="${{ env.TARGET_ENV }}/${{ env.ENV_VARIABLES_SECRET_PREFIX }}/env-variables"

          RAW_ENV_JSON=$(aws secretsmanager get-secret-value \
            --secret-id "$SECRET_ID" \
            --query SecretString --output text \
            --region us-east-1)

          KEY="${{ env.TARGET_ENV }}_${{ env.APP_NAME }}"

          echo "::notice::Reading env key '$KEY' from '$SECRET_ID'"
          SELECTED=$(echo "$RAW_ENV_JSON" | jq -rc --arg k "$KEY" '.[$k] // empty')
          if [ -z "$SELECTED" ] || [ "$SELECTED" = "null" ]; then
            echo "::error::Key '$KEY' not found in $SECRET_ID"
            echo "::error::Expected format: <env>_<app_name> (ex: dev_orbit-enterpriseapi-tails)"
            exit 1
          fi
          ENV_JSON="$SELECTED"

          echo "$ENV_JSON" | jq -r '
            if type == "string" then fromjson else . end
            | to_entries
            | .[]
            | .key + "=" + (.value | tostring)
          ' > .env

          if [ ! -s .env ]; then
            echo "::error::.env content is empty. Check secret format for key $KEY."
            exit 1
          fi

          echo "env_b64=$(base64 -w 0 .env)" >> "$GITHUB_OUTPUT"
          tar --exclude-vcs --exclude='node_modules' -czf repo.tar.gz .
          REPO_BYTES=$(wc -c < repo.tar.gz | awk '{print $1}')
          echo "::notice::Compressed repo payload size: ${REPO_BYTES} bytes"
          if [ "$REPO_BYTES" -gt 300000 ]; then
            echo "::error::Repository payload is too large for reliable SSM inline transfer (${REPO_BYTES} bytes)."
            echo "::error::Reduce payload size or switch to pull-from-git/S3 sync on EC2."
            exit 1
          fi
          echo "repo_b64=$(base64 -w 0 repo.tar.gz)" >> "$GITHUB_OUTPUT"

      - name: Sync repo and deploy compose through AWS SSM
        shell: bash
        run: |
          set -euo pipefail

          TARGET_INSTANCE="${{ steps.config.outputs.ec2_instance_id }}"
          TARGET_REGION="${{ steps.config.outputs.deploy_region }}"
          DEPLOY_PATH="${{ env.DEPLOY_PATH }}"
          COMPOSE_RELATIVE_PATH="${{ env.COMPOSE_RELATIVE_PATH }}"
          ENV_B64='${{ steps.envfile.outputs.env_b64 }}'
          REPO_B64='${{ steps.envfile.outputs.repo_b64 }}'

          REMOTE_SCRIPT=$(mktemp)
          {
            printf '%s\n' 'set -eu'
            printf '%s\n' "sudo mkdir -p \"$DEPLOY_PATH\""
            printf '%s\n' "echo \"$REPO_B64\" | base64 -d > /tmp/orbit-enterpriseapi-tails.tar.gz"
            printf '%s\n' "sudo rm -rf \"$DEPLOY_PATH\"/*"
            printf '%s\n' "sudo tar -xzf /tmp/orbit-enterpriseapi-tails.tar.gz -C \"$DEPLOY_PATH\""
            printf '%s\n' "sudo rm -f /tmp/orbit-enterpriseapi-tails.tar.gz"
            printf '%s\n' "echo \"$ENV_B64\" | base64 -d | sudo tee \"$DEPLOY_PATH/docker/.env\" >/dev/null"
            printf '%s\n' "sudo chmod 600 \"$DEPLOY_PATH/docker/.env\""
            printf '%s\n' "sudo docker compose -f \"$DEPLOY_PATH/$COMPOSE_RELATIVE_PATH\" down || true"
            printf '%s\n' "sudo docker compose -f \"$DEPLOY_PATH/$COMPOSE_RELATIVE_PATH\" up -d --build"
            printf '%s\n' "sudo docker compose -f \"$DEPLOY_PATH/$COMPOSE_RELATIVE_PATH\" ps"
          } > "$REMOTE_SCRIPT"

          jq -n --rawfile script "$REMOTE_SCRIPT" '{commands: [$script]}' > commands.json
          rm -f "$REMOTE_SCRIPT"

          COMMAND_ID=$(aws ssm send-command \
            --document-name AWS-RunShellScript \
            --targets "Key=instanceIds,Values=$TARGET_INSTANCE" \
            --parameters file://commands.json \
            --timeout-seconds 1800 \
            --region "$TARGET_REGION" \
            --query 'Command.CommandId' --output text)

          if [ -z "$COMMAND_ID" ] || [ "$COMMAND_ID" = "None" ]; then
            echo "::error::Failed to submit SSM command."
            exit 1
          fi
          echo "::notice::SSM Command ID: $COMMAND_ID"

          TIMEOUT=1800
          ELAPSED=0
          STATUS="Pending"
          while [ $ELAPSED -lt $TIMEOUT ]; do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$TARGET_INSTANCE" \
              --region "$TARGET_REGION" \
              --query 'Status' --output text 2>/dev/null || echo "InProgress")

            if [ "$STATUS" = "Success" ] || [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
              break
            fi

            sleep 10
            ELAPSED=$((ELAPSED + 10))
          done

          echo "=== SSM status: $STATUS ==="
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$TARGET_INSTANCE" \
            --region "$TARGET_REGION" \
            --query 'StandardOutputContent' --output text || true
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$TARGET_INSTANCE" \
            --region "$TARGET_REGION" \
            --query 'StandardErrorContent' --output text || true

          if [ "$STATUS" != "Success" ]; then
            echo "::error::Deployment failed with final status: $STATUS"
            exit 1
          fi
